name: public-surface-guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout protocol source
        uses: actions/checkout@v4
        with:
          repository: IndrasNet108/decirepo
          path: decirepo-core

      - name: Protocol exact-match guard
        run: |
          bash scripts/check_protocol_sync.sh decirepo-core

      - name: Start local static server
        run: |
          python3 -m http.server 8000 >/tmp/decirepo-site-http.log 2>&1 &
          echo $! > /tmp/decirepo-site-http.pid
          sleep 2

      - name: Run public surface checks
        run: |
          bash scripts/check_public_surface.sh "http://127.0.0.1:8000"

      - name: Stop local static server
        if: always()
        run: |
          kill "$(cat /tmp/decirepo-site-http.pid)" || true
