<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>DeciRepo — Diff</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <div class="page-shell">
    <div id="header-root"></div>
    <div id="context-nav-root"></div>

    <main class="page-diff">
      <section class="panel">
        <h1 class="section-title" id="diff-title">Compare Decisions</h1>
        <p class="section-subtitle">Changed values are highlighted.</p>
      </section>

      <section id="diff-root"></section>

      <section class="panel">
        <div class="button-row">
          <button id="btn-left" class="btn" type="button">Open Left Decision</button>
          <button id="btn-right" class="btn" type="button">Open Right Decision</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-brand">DeciRepo</div>
      <div class="footer-description">Decision infrastructure powered by DLX</div>
      <div class="footer-engine">
        <img class="footer-dlx-logo" src="../assets/brand/dlx-logo.png" alt="DLX logo" />
        <div class="footer-engine-text">DLX deterministic engine</div>
      </div>
      <div class="footer-links">
        <a class="menu-link" href="./privacy.html">Privacy Policy</a>
        <a class="menu-link" href="./terms.html">Terms of Use</a>
        <a class="menu-link" href="./disclaimer.html">Disclaimer</a>
        <a class="menu-link" href="./billing.html">Billing & Refunds</a>
        <a class="menu-link" href="mailto:info@indrasnet.ee">Contact</a>
      </div>
      <div class="footer-legal">© 2026 IndrasNet OÜ</div>
      <div class="footer-meta">IndrasNet Protocol Steward · Estonia</div>
      <div class="footer-meta">DeciRepo Protocol v0.1</div>
    </footer>

  </div>

  <script src="../assets/data.js"></script>
  <script src="../components/header.js"></script>
  <script src="../components/context-nav.js"></script>
  <script src="../components/diff-view.js"></script>
  <script>
    window.DeciRepoHeader.mount("header-root", "repository");

    const params = new URLSearchParams(window.location.search);
    const leftId = params.get("left") || "DR-0001";
    const rightId = params.get("right") || "DR-0002";

    const left = window.DeciRepoData.getDecisionById(leftId);
    const right = window.DeciRepoData.getDecisionById(rightId);
    const visual = (d) => `◢${d.short_hash}`;

    window.DeciRepoContextNav.mount("context-nav-root", {
      current: "Compare",
      meta: `${leftId} ↔ ${rightId}`,
      hint: "Suggested next: return to one decision and continue with verification or lineage review.",
      links: [
        { label: "Open Left Decision", href: `./decision.html?id=${encodeURIComponent(leftId)}`, primary: true },
        { label: "Open Right Decision", href: `./decision.html?id=${encodeURIComponent(rightId)}` },
        { label: "Back to Repository", href: "./index.html" },
        { label: "Feed", href: "./feed.html" },
        { label: "Protocol", href: "./protocol.html" }
      ]
    });

    if (!left || !right) {
      document.getElementById("diff-root").innerHTML = '<section class="panel"><h2 class="section-title">Comparison data missing</h2></section>';
    } else {
      document.getElementById("diff-title").textContent = `Compare: ${visual(left)} ↔ ${visual(right)}`;
      window.DeciRepoDiffView.mount("diff-root", left, right);
    }

    document.getElementById("btn-left").addEventListener("click", () => {
      window.location.href = `./decision.html?id=${encodeURIComponent(leftId)}`;
    });

    document.getElementById("btn-right").addEventListener("click", () => {
      window.location.href = `./decision.html?id=${encodeURIComponent(rightId)}`;
    });
  </script>
</body>
</html>
